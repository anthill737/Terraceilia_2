name: Export Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.5"
  GODOT_RELEASE: "stable"

jobs:
  export-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Import Project
        run: |
          godot --headless --import . 2>&1 || true
          sleep 2

      - name: Export Windows Build
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/Terraceilia.exe 2>&1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Terraceilia-Windows
          path: build/windows/
          retention-days: 30
